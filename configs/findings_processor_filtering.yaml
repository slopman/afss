# Findings Processor - Statistical Intelligence Filtering Rules
# Based on analysis of 261M real data from 13 security tools

findings_processor:
  filtering:
    # Include all severity levels for security scanning
    min_severity: "Low"
    min_confidence: "Possible"

    statistical_filters:

      # 🧪 TEST FILES - MAJOR FALSE POSITIVES SOURCE (87% of secrets, 100% of bandit findings)
      - pattern: ".*"  # Any finding
        file_pattern: "*test*"
        severity_reduction: 2  # HIGH→MEDIUM, MEDIUM→LOW, LOW→INFO
        confidence_reduction: 1
        reason: "Test files contain legitimate hardcoded values"

      - pattern: ".*"
        file_pattern: "*spec*"
        severity_reduction: 2
        confidence_reduction: 1
        reason: "Spec files often contain test data"

      - pattern: ".*"
        file_pattern: "*mock*"
        severity_reduction: 1
        confidence_reduction: 1
        reason: "Mock files contain fake data"

      # 🔑 SECRETS IN TEST FILES - 87% FALSE POSITIVES
      - pattern: "hashicorp-tf-password|generic-api-key|private-key"
        file_pattern: "*test*"
        action: "reduce_confidence"
        reduction_level: 2  # Certain→Possible
        reason: "Test credentials are not real secrets"

      - pattern: "hashicorp-tf-password|generic-api-key|private-key"
        file_pattern: "*spec*|*mock*|*example*"
        action: "reduce_confidence"
        reduction_level: 3  # Certain→Uncertain
        reason: "Example/spec credentials are fake"

      # 🐍 PYTHON HARDCODED VALUES - COMMON FALSE POSITIVES
      - pattern: "B105|B106"  # hardcoded_password_string/funcarg
        file_pattern: "*test*"
        action: "ignore"
        reason: "Test files legitimately hardcode passwords"

      - pattern: "B105|B106"
        file_pattern: "*example*|*sample*|*demo*"
        action: "reduce_severity"
        reduction_level: 1
        reason: "Example files may contain demo credentials"

      # ⚠️ ASSERT STATEMENTS - PYTHON TEST ARTIFACTS
      - pattern: "B101"  # assert_used
        file_pattern: "*test*"
        action: "ignore"
        reason: "Asserts are normal in test files"

      # 🔄 WEAK CRYPTO IN TESTS - LEGITIMATE
      - pattern: "B311"  # random
        file_pattern: "*test*"
        action: "reduce_severity"
        reduction_level: 1
        reason: "Test files may use predictable random for reproducibility"

      # 📁 GENERATED/CONFIG FILES - LOW VALUE
      - pattern: ".*"
        file_pattern: "*generated*|*.pb.go|*auto*|*migrations*"
        severity_reduction: 1
        reason: "Generated files often trigger false positives"

      # 🗂️ CONFIG FILES - EXPECTED HARDCODED VALUES
      - pattern: "B105|B106"
        file_pattern: "*config*|*settings*|*conf*"
        confidence_reduction: 1
        reason: "Config files may legitimately contain credentials"

  prioritization:
    # Business impact weights based on file patterns
    business_context:
      critical_paths:
        - "src/**/*.py"      # Core business logic
        - "app/**/*.js"      # Frontend business logic
        - "api/**/*.go"      # API endpoints
        - "**/models.py"     # Data models
        - "**/services/"     # Business services

      data_sensitivity:
        high:
          - "**/auth*/**"     # Authentication
          - "**/payment*/**"  # Payments
          - "**/*key*/**"     # Keys
          - "**/*secret*/**"  # Secrets
          - "**/*crypto*/**"  # Crypto

        medium:
          - "**/user*/**"     # User data
          - "**/config*/**"   # Configs
          - "**/*api*/**"     # APIs

  deduplication:
    enabled: true
    similarity_threshold: 0.85
    aggressive_normalization: true  # Remove whitespace, comments, lowercase

  output:
    formats: ["json", "html", "sarif"]
    max_findings: 100
    group_by: "severity"
    include_metadata: true
    include_correlations: true